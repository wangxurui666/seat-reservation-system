{% extends "base.html" %}
{% block title %}注册 — 自习室座位预约系统{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>创建账号</h1>
            <p>加入我们，开始预约你的自习座位</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）" required minlength="6">
            </div>
            <div class="form-group">
                <label for="real_name">真实姓名</label>
                <input type="text" id="real_name" name="real_name" placeholder="请输入真实姓名" required>
            </div>
            <div class="form-group">
                <label for="student_id">学号</label>
                <input type="text" id="student_id" name="student_id" placeholder="请输入学号">
            </div>
            <button type="submit" class="btn btn-primary btn-full">注 册</button>
        </form>
        <div class="auth-footer">
            <span>已有账号？</span>
            <a href="{{ url_for('login') }}">去登录</a>
        </div>
    </div>
</div>
{% endblock %}
