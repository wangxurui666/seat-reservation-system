{% extends "base.html" %}
{% block title %}登录 — 自习室座位预约系统{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>欢迎回来</h1>
            <p>登录以预约你的专属座位</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">登 录</button>
        </form>
        <div class="auth-footer">
            <span>还没有账号？</span>
            <a href="{{ url_for('auth.register') }}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
